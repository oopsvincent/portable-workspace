<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Package box icon -->
  <g transform="translate(256,256)" fill="none" stroke="url(#icon)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Box body -->
    <path d="M-110,35 L-110,-55 L0,-110 L110,-55 L110,35 L0,90 Z"/>
    <!-- Middle line -->
    <line x1="0" y1="-20" x2="0" y2="90"/>
    <!-- Top right -->
    <line x1="110" y1="-55" x2="0" y2="-20"/>
    <!-- Top left -->
    <line x1="-110" y1="-55" x2="0" y2="-20"/>
    <!-- Ribbon -->
    <line x1="-55" y1="-82" x2="55" y2="-38"/>
  </g>
</svg>
